<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌧️ Wort-Regen</title>
<style>
/* ── Flat-Design-Tokens der Plattform ── */
:root {
  --c-der: #1CB0F6; --c-der-dark: #1899D6;
  --c-die: #FF4B4B; --c-die-dark: #E04343;
  --c-das: #58CC02; --c-das-dark: #4CAF02;
  --prime: #1CB0F6; --prime-dark: #1899D6;
  --text: #3C3C3C; --soft: #999; --line: #E5E5E5;
  --r: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  background: #fff; color: var(--text);
  user-select: none; -webkit-user-select: none;
  touch-action: manipulation;
}
.screen { display: none; height: 100%; flex-direction: column; align-items: center;
  padding: 16px; max-width: 520px; margin: 0 auto; }
.screen.active { display: flex; }

h1 { font-size: 1.5rem; font-weight: 900; margin: 8px 0 2px; }
.sub { color: var(--soft); font-weight: 700; font-size: .9rem; text-align: center; }

.btn {
  display: block; width: 100%; padding: 15px; margin: 8px 0;
  border-radius: var(--r); font-size: 1.05rem; font-weight: 900;
  background: var(--prime); color: #fff; cursor: pointer; font-family: inherit;
  border: 2px solid var(--prime-dark); border-bottom-width: 5px;
  transition: transform .08s, border-bottom-width .08s;
}
.btn:active { transform: translateY(3px); border-bottom-width: 2px; }
.btn.secondary { background: #fff; color: var(--prime); border-color: var(--line); }

.profile-row { display: flex; gap: 10px; width: 100%; margin: 10px 0; }
.p-card {
  flex: 1; background: #fff; border: 2px solid var(--line); border-bottom-width: 5px;
  border-radius: var(--r); padding: 14px 6px; text-align: center; cursor: pointer;
  font-weight: 900;
}
.p-card.sel { border-color: var(--prime); color: var(--prime); }
.p-card .av { font-size: 1.9rem; display: block; }

.mode-row { display: flex; gap: 10px; width: 100%; margin: 4px 0 10px; }
.m-card { flex: 1; background: #fff; border: 2px solid var(--line); border-bottom-width: 5px;
  border-radius: var(--r); padding: 10px 6px; text-align: center; cursor: pointer; font-weight: 800; font-size: .85rem; }
.m-card.sel { border-color: var(--c-das); color: var(--c-das-dark); }

/* ── Spielfeld ── */
#hud { display: flex; justify-content: space-between; align-items: center;
  width: 100%; font-weight: 900; font-size: 1.05rem; padding: 2px 4px 6px; }
#hud .hearts { letter-spacing: 2px; }
#field-wrap { position: relative; width: 100%; flex: 1; min-height: 0; }
#field {
  position: absolute; inset: 0;
  background: linear-gradient(#EAF7FF 0%, #F7FCFF 30%, #fff 100%);
  border: 2px solid var(--line); border-radius: var(--r); overflow: hidden;
}
#deadline { position: absolute; left: 0; right: 0; border-top: 2px dashed #FFB0B0; opacity: .7; }

.tile {
  position: absolute; display: flex; align-items: center; justify-content: center; gap: 6px;
  background: #fff; border: 2px solid var(--line); border-radius: 12px;
  font-weight: 900; overflow: hidden; white-space: nowrap;
  transition: bottom .18s ease-out;
}
.tile .em { pointer-events: none; }
.tile.pop  { animation: pop .3s forwards; }
@keyframes pop { to { transform: scale(1.4); opacity: 0; } }
.tile .art-badge { font-size: .8em; padding: 0 6px; border-radius: 8px; color: #fff; }

/* Zerbrochene Kachel: bleibt stehen, sieht aber kaputt aus — Risse,
   schief, jeder Buchstabe leicht verrutscht. Reparieren bringt +½. */
.tile.broken {
  border-style: dashed; border-width: 3px;
  transform: rotate(-1.5deg);
  background:
    linear-gradient(105deg, transparent 42%, rgba(0,0,0,.14) 42.5%, transparent 43%),
    linear-gradient(63deg,  transparent 61%, rgba(0,0,0,.12) 61.5%, transparent 62%),
    linear-gradient(160deg, transparent 24%, rgba(0,0,0,.10) 24.5%, transparent 25%),
    #FFF6F4;
}
.tile.broken .ltr { display: inline-block; }

/* Buchstaben-Splitter: Kopien der Buchstaben fliegen aus der Kachel */
.shard {
  position: absolute; font-weight: 900; z-index: 12; pointer-events: none;
  transition: transform .8s cubic-bezier(.2,.6,.4,1), opacity .8s;
}
#field.shake { animation: shake .35s; }
@keyframes shake {
  0%, 100% { transform: translate(0, 0); }
  20% { transform: translate(-9px, 3px); }
  40% { transform: translate(8px, -4px); }
  60% { transform: translate(-6px, 2px); }
  80% { transform: translate(5px, -2px); }
}
#greet { text-align: center; font-weight: 900; font-size: 1.15rem; margin: 14px 0 4px; }

#faller {
  position: absolute; display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 900; border-radius: 12px;
  border: 2px solid rgba(0,0,0,.15); border-bottom-width: 4px;
  transition: left .12s ease-out; z-index: 5;
}
.boom { position: absolute; font-size: 2.4rem; z-index: 9; animation: boom .6s forwards; pointer-events: none; }
@keyframes boom { 0% { transform: scale(.4); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
.plus1 { position: absolute; font-weight: 900; color: var(--c-das-dark); z-index: 9;
  animation: rise .7s forwards; pointer-events: none; font-size: 1.3rem; }
@keyframes rise { to { transform: translateY(-46px); opacity: 0; } }

#over-emoji { font-size: 3.4rem; margin-top: 30px; }
#over-score { font-size: 2rem; font-weight: 900; color: var(--prime); }
.hint-line { color: var(--soft); font-weight: 700; font-size: .85rem; text-align: center; margin-top: 8px; }
.snd-btn { position: absolute; top: 10px; right: 10px; z-index: 20; background: #fff;
  border: 2px solid var(--line); border-radius: 50%; width: 40px; height: 40px;
  font-size: 1.1rem; cursor: pointer; }
</style>
</head>
<body>

<!-- ══════════ Start ══════════ -->
<div class="screen active" id="s-start">
  <h1>🌧️ Wort-Regen</h1>
  <p class="sub">Fang die Wörter mit dem richtigen Artikel!<br>Acchiappa le parole con l'articolo giusto!</p>
  <div id="greet" style="display:none;"></div>
  <div class="profile-row" id="profile-row"></div>
  <div class="mode-row">
    <div class="m-card" id="mode-normal" onclick="setMode('normal')">🚀 Normal<br><span style="font-weight:700; opacity:.7;">schneller</span></div>
    <div class="m-card" id="mode-sanft" onclick="setMode('sanft')">🌸 Sanft<br><span style="font-weight:700; opacity:.7;">langsamer + Bilder</span></div>
  </div>
  <button class="btn" onclick="startGame()">Spielen! 🌧️</button>
  <div class="hint-line" id="start-high"></div>
  <div class="hint-line">Steuern: ← → tippen oder Pfeiltasten · Spalte antippen = dorthin fallen</div>
  <button class="btn secondary" onclick="location.href='index.html'">← Zurück zur Lernplattform</button>
</div>

<!-- ══════════ Spiel ══════════ -->
<div class="screen" id="s-game">
  <div id="hud">
    <span id="hud-score">⭐ 0</span>
    <span class="hearts" id="hud-hearts">❤️❤️❤️</span>
    <button class="snd-btn" style="position:static;" onclick="toggleSnd()" id="snd-btn">🔊</button>
    <span style="cursor:pointer;" onclick="endGame(true)">✕</span>
  </div>
  <div id="field-wrap"><div id="field"></div></div>
</div>

<!-- ══════════ Vorbei ══════════ -->
<div class="screen" id="s-over">
  <div id="over-emoji">🌈</div>
  <h1 id="over-title">Geschafft!</h1>
  <div id="over-score">0</div>
  <div class="hint-line" id="over-high"></div>
  <div class="hint-line" id="over-learn"></div>
  <button class="btn" onclick="startGame()">Nochmal! 🔁</button>
  <button class="btn secondary" onclick="showStart()">🏠 Zum Start</button>
</div>

  return s.toLowerCase()
    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss')
    .replace(/[^a-z0-9]/g, '');
}

   falsche Werkzeug zum Erstlernen. Rückfallstufen für neue Profile. ── */
function buildPool() {
  const srs = safeParse(localStorage.getItem(`gram_srs_${profile}`)) || {};
  const byName = {};
  WORDS.forEach(w => byName[w[0]] = w);
  let pool = Object.keys(srs).filter(de => srs[de].b >= 2 && byName[de]).map(de => byName[de]);
  if (pool.length < 12) {
    pool = Object.keys(srs).filter(de => byName[de]).map(de => byName[de]);
  }
  if (pool.length < 12) {
    // Ganz frisches Profil (z.B. Marta): sanfter Startwortschatz
    pool = WORDS.filter(w => ['tiere', 'essen', 'haus'].includes(w[3])).slice(0, 40);
  }
  return pool;
}

/* ── Audio: echte Aufnahmen (Artikel + Nomen), Gerätestimme als Netz ── */
function sndOn() { return localStorage.getItem('wr_sound') !== '0'; }
function toggleSnd() {
  localStorage.setItem('wr_sound', sndOn() ? '0' : '1');
  document.getElementById('snd-btn').textContent = sndOn() ? '🔊' : '🔇';
}
let clip = null;
function say(word) {
  if (!sndOn()) return;
  try {
    if (clip) clip.pause();
    clip = new Audio(`audio/a_${slug(word[0])}.mp3`);
    clip.onerror = () => fallbackSay(word);
    clip.play().catch(() => fallbackSay(word));
  } catch { fallbackSay(word); }
}
function fallbackSay(word) {
  if (!('speechSynthesis' in window)) return;
  try {
    const u = new SpeechSynthesisUtterance(`${word[1]} ${word[0]}`);
    u.lang = 'de-DE'; u.rate = 0.92;
    speechSynthesis.speak(u);
  } catch {}
}

/* ── Start-Bildschirm ── */
function renderProfiles() {
  const row = document.getElementById('profile-row');
  const greet = document.getElementById('greet');
  if (fromPlatform) {
    // Profil wurde schon auf der Plattform gewählt — nicht nochmal fragen.
    // Der eine Spielen!-Tipp bleibt: er schaltet auf dem iPad den Ton frei.
    row.style.display = 'none';
    const p = PROFILES.find(x => x.name === profile);
    greet.style.display = '';
    greet.textContent = `Hallo, ${profile}! ${p ? p.avatar : ''}`;
  } else {
    row.style.display = '';
    greet.style.display = 'none';
    row.innerHTML = PROFILES.map(p => `
      <div class="p-card ${p.name === profile ? 'sel' : ''}" onclick="setProfile('${p.name}')">
        <span class="av">${p.avatar}</span>${p.name}
      </div>`).join('');
  }
  const hi = parseFloat(localStorage.getItem(`wr_high_${profile}`)) || 0;
  document.getElementById('start-high').textContent =
    hi ? `🏆 ${profile}s Rekord: ${fmtScore(hi)} Punkte` : 'Noch kein Rekord — auf geht\'s!';
}
function setProfile(name) {
  profile = name;
  const p = PROFILES.find(x => x.name === name);
  setMode(p ? p.defMode : 'normal');
  renderProfiles();
}
function setMode(m) {
  mode = m;
  document.getElementById('mode-normal').classList.toggle('sel', m === 'normal');
  document.getElementById('mode-sanft').classList.toggle('sel', m === 'sanft');
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showStart() { renderProfiles(); showScreen('s-start'); }

/* ── Spielzustand ── */
let G = null;        // laufendes Spiel
let rafId = 0;

function conf() {
  // Sanft-Modus (Marta): langsamer, größere Kacheln mit Bild, mehr Luft
  return mode === 'sanft'
    ? { tileH: 58, font: 1.05, showEm: true,  fall: 42,  fallMax: 90,  rowMs: 14000, rowMsMin: 8000,  softMult: 6 }
    : { tileH: 46, font: 0.95, showEm: false, fall: 70,  fallMax: 170, rowMs: 9000,  rowMsMin: 4500,  softMult: 8 };
}

function startGame(retry = 0) {
  if (!profile) return;
  const c = conf();
  // WICHTIG: erst den Spielbildschirm zeigen, DANN messen — ein
  // verstecktes Feld hat Breite/Höhe 0 und das Spiel wäre sofort vorbei
  showScreen('s-game');
  const field = document.getElementById('field');
  field.innerHTML = '<div id="deadline"></div>';
  const W = field.clientWidth || field.getBoundingClientRect().width;
  const H = field.clientHeight || field.getBoundingClientRect().height;
  // Layout noch nicht bereit (z.B. Drehung, Split-View, versteckter Tab):
  // kurz warten statt mit einem 0-Pixel-Feld zu starten
  if ((W < 200 || H < 300) && retry < 60) {
    requestAnimationFrame(() => startGame(retry + 1));
    return;
  }
  G = {
    c, W, H,
    colW: W / COLS,
    cols: [[], [], []],          // Stapel: Array von {word, el, revealed}
    pool: buildPool(),
    bag: [],                     // Nachschub ohne schnelle Wiederholungen
    score: 0, hearts: 3,
    faller: null,                // {word-gender, col, y, el, soft}
    speed: c.fall,               // px/s
    rowMs: c.rowMs,
    nextRow: performance.now() + 2500,
    last: performance.now(),
    over: false,
    learned: {},                 // im Spiel korrigierte Wörter (für den Schluss-Screen)
  };
  const dl = document.getElementById('deadline');
  dl.style.top = (c.tileH * 1.6) + 'px';
  updateHud();
  // Startstapel: zwei Reihen
  pushRow(); pushRow();
  spawnFaller();
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(tick);
}

function drawWord(w) {
  if (!G.bag.length) G.bag = [...G.pool].sort(() => Math.random() - 0.5);
  // keine Duplikate auf dem Feld
  const onField = new Set(G.cols.flat().map(t => t.word[0]));
  for (let i = 0; i < G.bag.length; i++) {
    if (!onField.has(G.bag[i][0])) return G.bag.splice(i, 1)[0];
  }
  return G.bag.pop();
}

function tileEl(word) {
  const c = G.c;
  const el = document.createElement('div');
  el.className = 'tile';
  el.style.width = (G.colW - 8) + 'px';
  el.style.height = (c.tileH - 6) + 'px';
  el.style.fontSize = c.font + 'rem';
  el.innerHTML = (c.showEm ? `<span class="em">${word[2]}</span>` : '') + word[0];
  return el;
}

function placeTile(t, col, row) {
  t.el.style.left = (col * G.colW + 4) + 'px';
  t.el.style.bottom = (row * G.c.tileH + 4) + 'px';
}

function pushRow() {
  // eine neue Wortreihe schiebt den Stapel nach oben
  for (let col = 0; col < COLS; col++) {
    const word = drawWord(G.pool);
    const t = { word, el: tileEl(word), revealed: false };
    document.getElementById('field').appendChild(t.el);
    G.cols[col].unshift(t);
    G.cols[col].forEach((tt, i) => placeTile(tt, col, i));
  }
  // Verloren, wenn der Stapel die Regenwolken erreicht
  const maxRows = Math.floor((G.H - G.c.tileH * 1.6) / G.c.tileH);
  if (G.cols.some(col => col.length > maxRows)) endGame();
}

function spawnFaller() {
  // Artikel so wählen, dass immer mindestens ein Spaltendach passt
  const tops = G.cols.map(col => col[col.length - 1]).filter(Boolean);
  if (!tops.length) { pushRow(); return spawnFaller(); }
  const genders = [...new Set(tops.map(t => t.word[1]))];
  const g = genders[Math.floor(Math.random() * genders.length)];
  const el = document.createElement('div');
  el.id = 'faller';
  el.textContent = g;
  el.style.width = (G.colW - 20) + 'px';
  el.style.height = (G.c.tileH - 10) + 'px';
  el.style.fontSize = (G.c.font * 1.15) + 'rem';
  el.style.background = `var(--c-${g})`;
  el.style.borderBottomColor = `var(--c-${g}-dark)`;
  document.getElementById('field').appendChild(el);
  G.faller = { g, col: 1, y: -G.c.tileH, el, soft: false };
  moveFallerX();
}

function moveFallerX() {
  G.faller.el.style.left = (G.faller.col * G.colW + 10) + 'px';
}

function tick(now) {
  if (!G || G.over) return;
  const dt = Math.min(64, now - G.last) / 1000;
  G.last = now;

  // neue Reihe fällig?
  if (now >= G.nextRow) {
    pushRow();
    G.nextRow = now + G.rowMs;
  }

  // Artikel fällt
  const f = G.faller;
  if (f) {
    f.y += G.speed * (f.soft ? G.c.softMult : 1) * dt;
    f.el.style.top = f.y + 'px';
    const stack = G.cols[f.col];
    const stackTopY = G.H - stack.length * G.c.tileH - 4;
    if (f.y + (G.c.tileH - 10) >= stackTopY) land(f);
  }
  rafId = requestAnimationFrame(tick);
}

function land(f) {
  const stack = G.cols[f.col];
  const top = stack[stack.length - 1];
  f.el.remove();
  G.faller = null;

  if (top && top.word[1] === f.g) {
    // ── Treffer: Wort verschwindet, Punkt(e), Audio. Ein zerbrochenes
    //    Wort zu reparieren gibt nur +½ — der Artikel stand ja schon dran
    //    (gleiche Logik wie der zweite Versuch im Trainer). ──
    const gain = top.revealed ? 0.5 : 1;
    G.score += gain;
    say(top.word);
    top.el.classList.add('pop');
    const p = document.createElement('div');
    p.className = 'plus1'; p.textContent = gain === 1 ? '+1' : '+½';
    p.style.left = (f.col * G.colW + G.colW / 2 - 10) + 'px';
    p.style.bottom = (stack.length * G.c.tileH) + 'px';
    document.getElementById('field').appendChild(p);
    setTimeout(() => p.remove(), 700);
    setTimeout(() => top.el.remove(), 280);
    stack.pop();
    // Tempo zieht sanft an
    G.speed = Math.min(G.c.fallMax, G.speed + 2.5);
    G.rowMs = Math.max(G.c.rowMsMin, G.rowMs - 140);
  } else if (top) {
    // ── Daneben: großes KA-BOOM — Buchstaben fliegen durchs Feld, das
    //    Feld bebt, und das Wort bleibt ZERBROCHEN stehen, mit dem
    //    richtigen Artikel sichtbar (der Lernmoment). ──
    G.hearts--;
    const field = document.getElementById('field');
    const cx = f.col * G.colW + G.colW / 2;
    const cy = stack.length * G.c.tileH;

    // Feld bebt
    field.classList.remove('shake');
    void field.offsetWidth;
    field.classList.add('shake');

    // Doppelter Knall
    [['💥', 3.2, 0], ['✨', 2.2, 90]].forEach(([em, size, delay]) => {
      setTimeout(() => {
        const boom = document.createElement('div');
        boom.className = 'boom'; boom.textContent = em;
        boom.style.fontSize = size + 'rem';
        boom.style.left = (cx - 26) + 'px';
        boom.style.bottom = cy + 'px';
        field.appendChild(boom);
        setTimeout(() => boom.remove(), 650);
      }, delay);
    });

    // Buchstaben-Splitter: Kopien der Buchstaben fliegen in alle Richtungen
    [...top.word[0]].forEach((ch, i) => {
      const s = document.createElement('span');
      s.className = 'shard';
      s.textContent = ch;
      s.style.fontSize = G.c.font + 'rem';
      s.style.left = (cx - top.word[0].length * 5 + i * 10) + 'px';
      s.style.bottom = (cy + G.c.tileH / 2) + 'px';
      field.appendChild(s);
      const dx = (Math.random() - 0.5) * 320;
      const dy = -(40 + Math.random() * 260);
      const rot = (Math.random() - 0.5) * 540;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        s.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
        s.style.opacity = '0';
      }));
      setTimeout(() => s.remove(), 900);
    });

    if (!top.revealed) {
      top.revealed = true;
      top.el.classList.add('broken');
      top.el.style.borderColor = `var(--c-${top.word[1]})`;
      // Kachel-Inhalt neu aufbauen: Artikel-Abzeichen + verrutschte Buchstaben
      const letters = [...top.word[0]].map(ch =>
        `<span class="ltr" style="transform: translateY(${(Math.random() * 5 - 2.5).toFixed(1)}px) rotate(${(Math.random() * 14 - 7).toFixed(1)}deg)">${ch}</span>`).join('');
      top.el.innerHTML =
        `<span class="art-badge" style="background:var(--c-${top.word[1]})">${top.word[1]}</span>` +
        (G.c.showEm ? `<span class="em">${top.word[2]}</span>` : '') +
        `<span>${letters}</span>`;
      G.learned[top.word[0]] = top.word[1];
    }
    say(top.word);
  }
  updateHud();
  if (G.hearts <= 0) { endGame(); return; }
  if (!G.over) spawnFaller();
}

function updateHud() {
  document.getElementById('hud-score').textContent = `⭐ ${fmtScore(G.score)}`;
  document.getElementById('hud-hearts').textContent = '❤️'.repeat(Math.max(0, G.hearts)) + '🤍'.repeat(3 - Math.max(0, G.hearts));
}

function endGame(quit = false) {
  if (!G || G.over) { showStart(); return; }
  G.over = true;
  cancelAnimationFrame(rafId);
  const hiKey = `wr_high_${profile}`;
  const oldHi = parseFloat(localStorage.getItem(hiKey)) || 0;
  const isRecord = G.score > oldHi;
  if (isRecord) localStorage.setItem(hiKey, String(G.score));

  document.getElementById('over-emoji').textContent = isRecord ? '🏆' : G.score >= 10 ? '🌈' : '🌱';
  document.getElementById('over-title').textContent = isRecord ? 'NEUER REKORD!' : quit ? 'Bis bald!' : 'Der Stapel war schneller!';
  document.getElementById('over-score').textContent =
    G.score === 1 ? '1 Punkt' : `${fmtScore(G.score)} Punkte`;
  document.getElementById('over-high').textContent = `🏆 Rekord: ${fmtScore(Math.max(G.score, oldHi))}`;
  const learned = Object.entries(G.learned);
  document.getElementById('over-learn').innerHTML = learned.length
    ? `Merk dir: ${learned.map(([w, g]) => `<b style="color:var(--c-${g})">${g}</b> ${w}`).join(' · ')}`
    : 'Alle Artikel richtig — stark! 💪';
  showScreen('s-over');
}

/* ── Steuerung: Tastatur + Touch ── */
document.addEventListener('keydown', e => {
  if (!G || G.over || !G.faller) return;
  if (e.key === 'ArrowLeft'  && G.faller.col > 0)        { G.faller.col--; moveFallerX(); }
  if (e.key === 'ArrowRight' && G.faller.col < COLS - 1) { G.faller.col++; moveFallerX(); }
  if (e.key === 'ArrowDown' || e.key === ' ') { G.faller.soft = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  if (G && G.faller && (e.key === 'ArrowDown' || e.key === ' ')) G.faller.soft = false;
});
document.getElementById('field-wrap').addEventListener('pointerdown', e => {
  if (!G || G.over || !G.faller) return;
  const rect = document.getElementById('field').getBoundingClientRect();
  const col = Math.max(0, Math.min(COLS - 1, Math.floor((e.clientX - rect.left) / G.colW)));
  if (col === G.faller.col) G.faller.soft = true;      // gleiche Spalte antippen = schnell fallen
  else { G.faller.col = col; moveFallerX(); }          // andere Spalte = dorthin steuern
});
document.getElementById('field-wrap').addEventListener('pointerup', () => {
  if (G && G.faller) G.faller.soft = false;
});

/* Pause, wenn das Tab in den Hintergrund geht */
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { cancelAnimationFrame(rafId); }
  else if (G && !G.over) { G.last = performance.now(); rafId = requestAnimationFrame(tick); }
});

/* ── Start: Profil aus URL (?profil=) oder zuletzt genutzt ── */
(function init() {
  const urlP = new URLSearchParams(location.search).get('profil');
  const known = PROFILES.map(p => p.name);
  fromPlatform = known.includes(urlP);
  profile = fromPlatform ? urlP
    : known.includes(localStorage.getItem('gram_lastProfile')) ? localStorage.getItem('gram_lastProfile')
    : 'Chiara';
  setProfile(profile);
  document.getElementById('snd-btn').textContent = sndOn() ? '🔊' : '🔇';
})();
</script>
